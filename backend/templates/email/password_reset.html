{% extends "email/base_branded.html" %}

{% block content %}
  <p style="margin:0 0 16px 0; font-size:18px; line-height:28px; color:#111827; font-weight:700;">
    Hello {{ patient_name }} !
  </p>
  <p style="margin:0 0 14px 0; font-size:16px; line-height:26px; color:#42526b;">
    Did you forgot your password ? Oh no... Don't worry , reset your password by clicking the button below.
  </p>
  <p style="margin:0; font-size:14px; line-height:22px; color:#6b7d92;">
    For your safety, use this link only if you requested a password reset.
  </p>
{% endblock %}
