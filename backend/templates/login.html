{% extends "base.html" %}

{% block content %}
<h3>Login</h3>

<form method="post">
    {% csrf_token %}
    <input name="username" placeholder="Username"><br><br>
    <input name="password" type="password" placeholder="Password"><br><br>
    <button type="submit">Login</button>
</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

{% endblock %}
